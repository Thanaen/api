name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint
      - run: bun run fmt:check
      - run: bun run test:unit

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api-client
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install (workspace root)
        run: bun install
        working-directory: ${{ github.workspace }}
      - run: bun run build
      - run: bun run test
      - run: bun run typecheck

  test-db:
    runs-on: ubuntu-latest
    # Serialize access to the shared long-lived ci-tests Neon branch so
    # concurrent PRs don't stomp each other's schema / data.
    concurrency:
      group: neon-ci-tests-branch
      cancel-in-progress: false
    env:
      # Direct connection string to the long-lived ci-tests Neon branch.
      # Reusing one branch across all CI runs keeps the project's Neon
      # branch count constant regardless of CI volume.
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Reset schema on shared ci-tests branch
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DROP SCHEMA IF EXISTS public CASCADE;
          CREATE SCHEMA public;
          SQL

      - run: bun run db:migrate
      - run: bun run test:db

  migrate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
