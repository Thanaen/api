name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint
      - run: bun run fmt:check
      - run: bun run test:unit

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api-client
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install (workspace root)
        run: bun install
        working-directory: ${{ github.workspace }}
      - run: bun run build
      - run: bun run test
      - run: bun run typecheck

  test-db:
    runs-on: ubuntu-latest
    # Serialize access to the shared long-lived ci-tests Neon branch so
    # concurrent PRs don't stomp each other's schema / data.
    concurrency:
      group: neon-ci-tests-branch
      cancel-in-progress: false
    services:
      db:
        image: neondatabase/neon_local:latest
        ports:
          - 5432:5432
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          # Reuse a single long-lived CI branch instead of creating an
          # ephemeral branch per run. Keeps the project's Neon branch
          # count constant regardless of CI volume.
          BRANCH_ID: ${{ secrets.NEON_CI_BRANCH_ID }}
          DELETE_BRANCH: "false"
    env:
      DATABASE_URL: postgres://neon:npg@localhost:5432/neondb
      NEON_LOCAL_FETCH_ENDPOINT: http://localhost:5432/sql
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Reset schema on shared ci-tests branch
        env:
          PGPASSWORD: npg
        run: |
          psql -h localhost -U neon -d neondb -v ON_ERROR_STOP=1 <<'SQL'
          DROP SCHEMA IF EXISTS public CASCADE;
          CREATE SCHEMA public;
          SQL

      - run: bun run db:migrate
      - run: bun run test:db

  migrate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
