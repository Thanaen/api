name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint
      - run: bun run fmt:check
      - run: bun run test:unit

  test-db:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://neon:npg@localhost:5432/neondb
      NEON_LOCAL_FETCH_ENDPOINT: http://localhost:5432/sql
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Clean up stale Neon CI branches
        run: |
          branches=$(curl -sf \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            | jq -r '.branches[] | select(.name | startswith("neonlocal-")) | .id')
          for id in $branches; do
            echo "Deleting branch $id"
            curl -sf -X DELETE \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$id" || true
          done

      - name: Start neon_local
        run: |
          docker run -d --name neondb \
            -p 5432:5432 \
            -e NEON_API_KEY=$NEON_API_KEY \
            -e NEON_PROJECT_ID=$NEON_PROJECT_ID \
            neondatabase/neon_local:latest

      - name: Wait for neon_local to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5432/sql > /dev/null 2>&1; then
              echo "neon_local is ready"
              exit 0
            fi
            echo "Waiting for neon_local... ($i/30)"
            sleep 2
          done
          echo "neon_local failed to start"
          docker logs neondb
          exit 1

      - run: bun run db:migrate
      - run: bun run test:db

      - name: Clean up Neon branch
        if: always()
        run: |
          branches=$(curl -sf \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            | jq -r '.branches[] | select(.name | startswith("neonlocal-")) | .id')
          for id in $branches; do
            echo "Deleting branch $id"
            curl -sf -X DELETE \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$id" || true
          done

  migrate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
